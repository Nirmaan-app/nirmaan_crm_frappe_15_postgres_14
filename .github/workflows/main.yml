name: Build and Push nirmaan_crm
on:
  push:
    tags:
      - '*'

jobs:
  clone-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out frappe_docker
        uses: actions/checkout@v5
        with:
          repository: frappe/frappe_docker

      - name: Build apps.json (base64)
        id: apps_json
        run: |
          APPS_JSON=$(cat <<EOF
          [
            {
              "url": "https://github.com/Nirmaan-app/nirmaan_crm_frappe_15_postgres_14.git",
              "branch": "${{ github.ref_name }}"
            }
          ]
          EOF
          )
          APPS_JSON_B64=$(printf '%s' "$APPS_JSON" | base64 -w 0)
          echo "base64=${APPS_JSON_B64}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: asia-south1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GAR_JSON_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/custom/Containerfile
          platforms: linux/amd64
          push: true
          tags: asia-south1-docker.pkg.dev/nirmaan-stack/nirmaan-crm/nirmaan-crm:${{ github.ref_name }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-15
            APPS_JSON_BASE64=${{ steps.apps_json.outputs.base64 }}
